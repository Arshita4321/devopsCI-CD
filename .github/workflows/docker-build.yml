name: Python App Docker Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-python-and-docker:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python 3.10
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'

      # Step 3: Install dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt

      # Step 4: Optionally run a quick test (should terminate quickly)
      - name: Test Python script
        run: |
          python -m py_compile app.py
          echo "Python script compiled successfully"

      # Step 5: Set up Docker Buildx (optional, required for multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Step 6: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t pyapp:latest .